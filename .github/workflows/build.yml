name: Build EL PASE APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: |
          npx cap add android || echo "Android ya existe"
          npx cap sync android

      - name: Patch MainActivity for filesharer
        run: |
          cat > android/app/src/main/java/com/joseluengo/elpase/MainActivity.java <<'EOF'
          package com.joseluengo.elpase;

          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onSaveInstanceState(Bundle outState) {
                  super.onSaveInstanceState(outState);
                  outState.clear();
              }
          }
          EOF
          echo "MainActivity actualizado:"
          cat android/app/src/main/java/com/joseluengo/elpase/MainActivity.java

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build signed release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: el-pase-release
          path: android/app/build/outputs/apk/release/*.apk
